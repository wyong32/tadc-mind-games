<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play TADC Mind Games</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #060506;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #f2ebe3;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
      }

      .play-card {
        width: min(400px, 100%);
        padding: 2rem 1.5rem;
        border: 1px solid rgba(196, 160, 85, 0.6);
        background: rgba(12, 10, 11, 0.88);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      }

      .mark {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        margin: 0 auto 0.75rem;
        border: 1px solid #c4a055;
        color: #c4a055;
        font-size: 1.25rem;
      }

      h1 {
        font-size: clamp(1.2rem, 3vw, 1.5rem);
        font-weight: 600;
      }

      p {
        margin-top: 0.6rem;
        color: #c8bdb4;
        font-family: system-ui, sans-serif;
        font-size: 0.875rem;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 1.15rem;
        min-height: 40px;
        padding: 0 1.25rem;
        border: 1px solid #c4a055;
        background: rgba(196, 160, 85, 0.15);
        color: #c4a055;
        font-family: system-ui, sans-serif;
        font-size: 0.8125rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-decoration: none;
        text-transform: uppercase;
      }

      a:hover {
        background: rgba(196, 160, 85, 0.28);
      }
    </style>
  </head>
  <body>
    <div class="play-card">
      <div class="mark" aria-hidden="true">♠</div>
      <h1>TADC: Mind Games</h1>
      <p>Launch the official Demo to play in-browser.</p>
      <a href="https://pitchbox-studios.itch.io/tadc-mind-games" target="_blank" rel="noopener">Open Official Demo</a>
    </div>
  </body>
</html>
